<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Stopwatch with Smart Scrollbar</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        .main-container { display: flex; flex-direction: column; align-items: center; }

        .timer-row { display: flex; align-items: baseline; gap: 20px; margin-bottom: 20px; }

        #displayTitle { 
            font-size: 2.5rem; 
            color: #ffffff; 
            font-weight: bold;
            text-shadow: 
                -1px -1px 0 #000, 1px -1px 0 #000, 
                -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        #timer { 
            font-size: 6rem; 
            font-weight: bold; 
            color: #ffffff; 
            font-variant-numeric: tabular-nums; 
            cursor: pointer;
            text-shadow: 
                -2px -2px 0 #000, 2px -2px 0 #000, 
                -2px 2px 0 #000, 2px 2px 0 #000;
        }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 8px 16px; cursor: pointer; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #fff; border-radius: 4px; }

        #settingsPanel {
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border: 1px solid #444;
            margin-bottom: 10px;
        }
        
        #settingsPanel input { padding: 5px; border-radius: 4px; border: none; width: 80px; }

        #splits {
            width: 100%;
            max-width: 400px;
            height: 200px;
            overflow-y: auto;
            color: white;
            padding: 10px;
            scrollbar-width: thin; /* Firefox用 */
        }

        /* スマートなスクロールバーのスタイル (Chrome, Edge, OBS) */
        #splits::-webkit-scrollbar {
            width: 6px;
        }
        #splits::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }
        #splits::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }
        #splits::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        .split-item { 
            margin-bottom: 8px; 
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            font-size: 1.1rem;
            transition: background 0.3s;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="timer-row">
            <div id="displayTitle"></div>
            <div id="timer">00:00.0</div>
        </div>

        <div class="controls">
            <button onclick="toggleTimer()" id="startBtn">スタート</button>
            <button onclick="resetTimer()" id="resetBtn">リセット</button>
            <button onclick="addSplit()" id="splitBtn">スプリット</button>
        </div>

        <div id="settingsPanel">
            <input type="text" id="titleInput" placeholder="タイトル" style="width:150px" autocomplete="off" spellcheck="false">
            <input type="number" id="titleSize" value="2.5" step="0.1" placeholder="サイズ" oninput="updateSettings()">
            <input type="number" id="titleSpacing" value="0" step="1" placeholder="間隔" oninput="updateSettings()">
            <input type="color" id="colorPicker" value="#ffffff" oninput="updateSettings()" style="width:50px">
        </div>
    </div>

    <div id="splits"></div>

    <script>
        let startTime, elapsedTime = 0, timerInterval = null, splitCount = 0;

        const timerDisplay = document.getElementById('timer');
        const displayTitle = document.getElementById('displayTitle');
        const titleInput = document.getElementById('titleInput');
        const titleSize = document.getElementById('titleSize');
        const titleSpacing = document.getElementById('titleSpacing');
        const colorPicker = document.getElementById('colorPicker');

        // OBSの対話操作でのIMEトラブル（入力中のレイアウト変動によるフォーカス喪失）を防ぐため、
        // タイトルの更新タイミングを「確定時（change）」または「Enterキー押下時」に変更します。
        titleInput.addEventListener('change', updateSettings);
        
        titleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') updateSettings();
        });

        function getContrastBackground(hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128 ? 'rgba(0, 0, 0, 0.6)' : 'rgba(255, 255, 255, 0.2)';
        }

        function getEdgeColor(hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128 ? '#000000' : '#ffffff';
        }

        function updateSettings() {
            displayTitle.textContent = titleInput.value;
            displayTitle.style.fontSize = titleSize.value + 'rem';
            displayTitle.style.letterSpacing = titleSpacing.value + 'px';
            
            const color = colorPicker.value;
            timerDisplay.style.color = color;
            displayTitle.style.color = color;
            
            const edgeColor = getEdgeColor(color);
            timerDisplay.style.textShadow = `
                -2px -2px 0 ${edgeColor}, 2px -2px 0 ${edgeColor}, 
                -2px 2px 0 ${edgeColor}, 2px 2px 0 ${edgeColor}`;
            displayTitle.style.textShadow = `
                -1px -1px 0 ${edgeColor}, 1px -1px 0 ${edgeColor}, 
                -1px 1px 0 ${edgeColor}, 1px 1px 0 ${edgeColor}`;
            
            const bgColor = getContrastBackground(color);
            const splits = document.querySelectorAll('.split-item');
            splits.forEach(s => {
                s.style.color = color;
                s.style.backgroundColor = bgColor;
            });
        }

        function updateDisplay() {
            const totalSeconds = Math.floor(elapsedTime / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const deciseconds = Math.floor((elapsedTime % 1000) / 100);
            const mm = String(minutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');
            timerDisplay.textContent = hours > 0 ? `${hours}:${mm}:${ss}.${deciseconds}` : `${mm}:${ss}.${deciseconds}`;
        }

        function toggleTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('startBtn').textContent = 'スタート';
            } else {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(() => { elapsedTime = Date.now() - startTime; updateDisplay(); }, 100);
                document.getElementById('startBtn').textContent = 'ストップ';
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            elapsedTime = 0;
            splitCount = 0;
            document.getElementById('splits').innerHTML = '';
            document.getElementById('startBtn').textContent = 'スタート';
            updateDisplay();
        }

        function addSplit() {
            splitCount++;
            const div = document.createElement('div');
            div.className = 'split-item';
            div.style.color = colorPicker.value;
            div.style.backgroundColor = getContrastBackground(colorPicker.value);
            div.textContent = `スプリット${splitCount}　${timerDisplay.textContent}`;
            document.getElementById('splits').prepend(div);
        }
    </script>
</body>
</html>
