<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Stopwatch with Fixed Input</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .timer-row {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-bottom: 20px;
        }

        #displayTitle {
            font-size: 2.5rem;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        #timer {
            font-size: 6rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            font-variant-numeric: tabular-nums;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.4);
            color: #ffffff;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background-color: rgba(50, 50, 50, 0.6);
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #splits {
            color: rgba(255, 255, 255, 0.9);
            width: 100%;
            max-width: 400px;
            height: 165px;
            overflow-y: auto;
            font-size: 0.9rem;
            background-color: rgba(0, 0, 0, 0);
            border: none;
            text-align: center;
            border-radius: 6px;
        }

        .split-record {
            margin-bottom: 8px;
            padding: 8px 15px;
            border-radius: 4px;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        #modal {
            display: none;
            position: fixed;
            top: 10%;
            background: rgba(20, 20, 20, 0.95);
            padding: 20px;
            border-radius: 10px;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            text-align: center;
            border: 2px solid rgba(255,255,255,0.4);
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
        }

        #modal label { display: block; margin-top: 10px; font-size: 0.9rem; }
        #modal input { width: 80%; padding: 5px; margin-top: 5px; color: #000; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="timer-row">
            <div id="displayTitle"></div>
            <div id="timer" onclick="openModal()">00:00.0</div>
        </div>

        <div class="controls">
            <button onclick="toggleTimer()" id="startBtn">スタート</button>
            <button onclick="resetTimer()">リセット</button>
            <button onclick="addSplit()">スプリット</button>
        </div>
    </div>

    <div id="splits"></div>

    <div id="modal">
        <h3>詳細設定</h3>
        <label>タイトル:</label>
        <input type="text" id="titleInput" placeholder="タイトルを入力">
        
        <label>タイトルのサイズ (rem):</label>
        <input type="number" id="titleSize" value="2.5" step="0.1">

        <label>タイトルの文字間隔 (px):</label>
        <input type="number" id="titleSpacing" value="0" step="1">

        <label>タイマーの色:</label>
        <input type="color" id="colorPicker" value="#ffffff">
        
        <br><br>
        <button onclick="closeModal()">適用して閉じる</button>
    </div>

    <script>
        let startTime;
        let elapsedTime = 0;
        let timerInterval = null;
        let splitCount = 0;

        const timerDisplay = document.getElementById('timer');
        const displayTitle = document.getElementById('displayTitle');
        const startBtn = document.getElementById('startBtn');
        const splitsDisplay = document.getElementById('splits');
        const modal = document.getElementById('modal');
        const colorPicker = document.getElementById('colorPicker');
        const titleInput = document.getElementById('titleInput');
        const titleSize = document.getElementById('titleSize');
        const titleSpacing = document.getElementById('titleSpacing');

        function openModal() { 
            modal.style.display = 'block'; 
            // モーダルが開いた際に入力フィールドに強制フォーカス
            setTimeout(() => titleInput.focus(), 100);
        }
        
        function closeModal() { 
            timerDisplay.style.color = colorPicker.value;
            displayTitle.style.color = colorPicker.value;
            displayTitle.textContent = titleInput.value;
            displayTitle.style.fontSize = titleSize.value + 'rem';
            displayTitle.style.letterSpacing = titleSpacing.value + 'px';
            modal.style.display = 'none'; 
        }

        // 入力中のOBSキー入力をブロックしないようにイベントを伝播
        titleInput.addEventListener('keydown', (e) => {
            e.stopPropagation();
        });

        function updateDisplay() {
            const totalSeconds = Math.floor(elapsedTime / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const deciseconds = Math.floor((elapsedTime % 1000) / 100);
            
            const mm = String(minutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');
            
            if (hours > 0) {
                timerDisplay.textContent = `${hours}:${mm}:${ss}.${deciseconds}`;
            } else {
                timerDisplay.textContent = `${mm}:${ss}.${deciseconds}`;
            }
        }

        function toggleTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                startBtn.textContent = 'スタート';
            } else {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    updateDisplay();
                }, 100);
                startBtn.textContent = 'ストップ';
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            elapsedTime = 0;
            splitCount = 0;
            startBtn.textContent = 'スタート';
            splitsDisplay.innerHTML = '';
            updateDisplay();
        }

        function addSplit() {
            splitCount++;
            const splitContent = `スプリット${splitCount}　${timerDisplay.textContent}`;
            const span = document.createElement('span');
            span.textContent = splitContent;
            span.className = 'split-record';

            const div = document.createElement('div');
            div.appendChild(span);

            splitsDisplay.prepend(div);
        }
    </script>
</body>
</html>
